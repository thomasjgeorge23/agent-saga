[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-rollback"
version = "0.1.0"
description = "Transactional boundaries, typed compensation semantics, and a pre-flight safety gate for autonomous AI agents."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "AGPL-3.0-only" }
authors = [{ name = "Avertis Systems" }]
maintainers = [{ name = "Avertis Systems" }]
keywords = ["ai-agents", "saga", "rollback", "compensation", "llm", "observability"]
classifiers = [
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Programming Language :: Python :: 3",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.4", "langchain-core>=0.3"]
langgraph = ["langchain-core>=0.3", "langgraph>=0.2"]

[project.scripts]
agent-saga = "agent_saga.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["agent_saga"]
# The dashboard is a data file, not a module -- ship it in the wheel.
artifacts = ["agent_saga/ui/templates/*.html"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "tests"]
filterwarnings = ["error"]
