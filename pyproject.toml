[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-rollback"
version = "0.1.0"
description = "Transactional boundaries, typed compensation semantics, and a pre-flight safety gate for autonomous AI agents."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
keywords = ["ai-agents", "saga", "rollback", "compensation", "llm", "observability"]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.4", "langchain-core>=0.3"]
langgraph = ["langchain-core>=0.3", "langgraph>=0.2"]

[tool.hatch.build.targets.wheel]
packages = ["agent_saga"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "tests"]
filterwarnings = ["error"]
